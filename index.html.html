<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ================================================================
// STAGE DEFINITIONS
// ================================================================
const STAGES = {
  0: { name: "Hibernation", icon: "💤", color: "#64748B", glow: "rgba(100,116,139,0.10)", border: "#334155",
       strategy: "No Setup", desc: "Stock doesn't clearly fit any stage. Not consolidating in a defined range, not trending, not breaking out. Watch and wait." },
  1: { name: "Consolidation", icon: "◈", color: "#94A3B8", glow: "rgba(148,163,184,0.12)", border: "#475569",
       strategy: "Mean-Reversion", desc: "Sideways price action within a well-defined range. Volatility contracting (VCP). Timeframes: 4wk, 3mo, 6mo, 1yr, 3yr." },
  2: { name: "Breakout", icon: "⚡", color: "#3B82F6", glow: "rgba(59,130,246,0.15)", border: "#2563EB",
       strategy: "Directional Bias", desc: "Close outside the consolidation range on ≥0.7 RVOL. Breakout level is relative to the consolidation timeframe." },
  3: { name: "Trending", icon: "📈", color: "#22C55E", glow: "rgba(34,197,94,0.15)", border: "#16A34A",
       strategy: "Overnight Momo / Pullback Buys", desc: "EMA 5d > 10d > 20d stacking. Confirmed only if preceded by S1→S2 chain." },
  4: { name: "Exhausting", icon: "🔥", color: "#F59E0B", glow: "rgba(245,158,11,0.15)", border: "#D97706",
       strategy: "Delta-Hedge Options", desc: "Multiple daily gaps in same direction + expanding intraday ranges. Must come from a trend." },
  5: { name: "The Turn", icon: "🔄", color: "#EF4444", glow: "rgba(239,68,68,0.15)", border: "#DC2626",
       strategy: "Fully-Hedged Position", desc: "Snapback reversal after exhaustion. Gap in exhaustion direction + first-candle reversal. Rare — requires prior S4 exhaustion (multiple gaps + expanding ranges)." },
  6: { name: "Follow Through", icon: "✅", color: "#8B5CF6", glow: "rgba(139,92,246,0.15)", border: "#7C3AED",
       strategy: "Call/Put Spreads", desc: "Turn confirmed on above-avg volume, closing at extreme of intraday range." },
};

// ================================================================
// STOCK LISTS
// ================================================================
const MACRO = ["SPY","QQQ","IWM","TLT","GLD","SLV","USO"];
const MAINSTREAM = ["NVDA","AAPL","GOOG","MSFT","AMZN","META","AVGO","TSLA","BRK-B","WMT","LLY","JPM","XOM","JNJ","ORCL","COST","MU","NFLX","PLTR","HD","GE","KO","CAT","AMD","CSCO","RTX","AMAT"];
const INIT_IP = ["SNDK","BABA","OWL","GEV","SOC","SLG"];
const REFRESH_MS = 30 * 60 * 1000;
const TABS = { macro: { label: "Macro", syms: MACRO }, mainstream: { label: "Mainstream", syms: MAINSTREAM }, inplay: { label: "In Play" }, nearbreak: { label: "Near Break" } };

// ================================================================
// EMA FUNCTIONS
// ================================================================
function calcEMA(data, period) {
  if (!data || data.length < period) return null;
  const k = 2 / (period + 1);
  let ema = data.slice(0, period).reduce((s, v) => s + v, 0) / period;
  for (let i = period; i < data.length; i++) ema = data[i] * k + ema * (1 - k);
  return ema;
}
function calcEMASeries(data, period) {
  if (!data || data.length < period) return [];
  const k = 2 / (period + 1);
  const out = new Array(period - 1).fill(null);
  let ema = data.slice(0, period).reduce((s, v) => s + v, 0) / period;
  out.push(ema);
  for (let i = period; i < data.length; i++) { ema = data[i] * k + ema * (1 - k); out.push(ema); }
  return out;
}

// ================================================================
// RSI CALCULATION
// ================================================================
function calcRSI(data, period) {
  // Returns current RSI value (0–100)
  if (!data || data.length < period + 1) return null;
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const delta = data[i] - data[i - 1];
    if (delta > 0) avgGain += delta; else avgLoss += Math.abs(delta);
  }
  avgGain /= period;
  avgLoss /= period;
  for (let i = period + 1; i < data.length; i++) {
    const delta = data[i] - data[i - 1];
    avgGain = (avgGain * (period - 1) + (delta > 0 ? delta : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (delta < 0 ? Math.abs(delta) : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return +(100 - 100 / (1 + rs)).toFixed(1);
}

function calcRSISeries(data, period) {
  // Returns array of RSI values aligned with data indices (null for first `period` entries)
  if (!data || data.length < period + 1) return [];
  const out = new Array(period).fill(null);
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const delta = data[i] - data[i - 1];
    if (delta > 0) avgGain += delta; else avgLoss += Math.abs(delta);
  }
  avgGain /= period;
  avgLoss /= period;
  out.push(avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(1));
  for (let i = period + 1; i < data.length; i++) {
    const delta = data[i] - data[i - 1];
    avgGain = (avgGain * (period - 1) + (delta > 0 ? delta : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (delta < 0 ? Math.abs(delta) : 0)) / period;
    out.push(avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(1));
  }
  return out;
}

// ================================================================
// RELATIVE STRENGTH VS BENCHMARK
// ================================================================
// Computes stock's % change over `period` bars divided by benchmark's % change.
// RS > 1.0 = outperforming, RS < 1.0 = underperforming.
function calcRelativeStrength(stockHist, benchHist, period) {
  if (!stockHist || !benchHist || stockHist.length < period + 1 || benchHist.length < period + 1) return null;
  const sc = stockHist.map(d => d.c);
  const bc = benchHist.map(d => d.c);
  const sn = sc.length, bn = bc.length;
  const stockChg = (sc[sn - 1] - sc[sn - 1 - period]) / sc[sn - 1 - period];
  const benchChg = (bc[bn - 1] - bc[bn - 1 - period]) / bc[bn - 1 - period];
  if (Math.abs(benchChg) < 0.0001) return stockChg > 0 ? 99 : -99; // benchmark flat
  return +(stockChg / benchChg).toFixed(2);
}

// ================================================================
// MULTI-TIMEFRAME CONSOLIDATION DETECTION
// ================================================================
const CONSOL_TIMEFRAMES = [
  { name: "3y",  days: 756, maxRange: 0.45, label: "3-Year" },
  { name: "1y",  days: 252, maxRange: 0.30, label: "1-Year" },
  { name: "6m",  days: 126, maxRange: 0.25, label: "6-Month" },
  { name: "3m",  days: 63,  maxRange: 0.18, label: "3-Month" },
  { name: "4w",  days: 20,  maxRange: 0.12, label: "4-Week" },
];

// Timeframe-specific consolidation configs
// "days" = number of bars to look back (hours for hourly, weeks for weekly)
const TF_CONSOL = {
  hourly: [
    { name: "4w",  days: 130, maxRange: 0.15, label: "4-Week" },
    { name: "2w",  days: 65,  maxRange: 0.10, label: "2-Week" },
    { name: "1w",  days: 33,  maxRange: 0.08, label: "1-Week" },
    { name: "3d",  days: 20,  maxRange: 0.05, label: "3-Day" },
  ],
  weekly: [
    { name: "5y",  days: 260, maxRange: 0.55, label: "5-Year" },
    { name: "3y",  days: 156, maxRange: 0.45, label: "3-Year" },
    { name: "1y",  days: 52,  maxRange: 0.30, label: "1-Year" },
    { name: "6m",  days: 26,  maxRange: 0.22, label: "6-Month" },
    { name: "3m",  days: 13,  maxRange: 0.15, label: "3-Month" },
  ],
};

function detectConsolidation(hist, consolTimeframes) {
  const cl = hist.map(d => d.c);
  const n = cl.length;
  const result = { consolidating: false, label: null, days: 0, rangePct: 0, rangeHigh: 0, rangeLow: 0, crossovers: 0, emaFlatness: null };

  for (const tf of (consolTimeframes || CONSOL_TIMEFRAMES)) {
    if (n < tf.days) continue;
    const slice = cl.slice(-tf.days);
    const high = Math.max(...slice);
    const low = Math.min(...slice);
    const rangePct = (high - low) / low;

    if (rangePct <= tf.maxRange) {
      // Count EMA8/EMA21 crossovers in this window
      const ema8s = calcEMASeries(cl, 8);
      const ema21s = calcEMASeries(cl, 21);
      let crossovers = 0;
      const startIdx = n - tf.days;
      for (let i = Math.max(startIdx, 21); i < n; i++) {
        if (ema8s[i] != null && ema21s[i] != null && ema8s[i-1] != null && ema21s[i-1] != null) {
          const prev = ema8s[i-1] - ema21s[i-1];
          const curr = ema8s[i] - ema21s[i];
          if ((prev > 0 && curr < 0) || (prev < 0 && curr > 0)) crossovers++;
        }
      }

      // EMA flatness: avg daily % change of EMA8 over the window
      let emaDeltas = 0, deltaCount = 0;
      for (let i = Math.max(startIdx, 8); i < n; i++) {
        if (ema8s[i] != null && ema8s[i-1] != null && ema8s[i-1] !== 0) {
          emaDeltas += Math.abs((ema8s[i] - ema8s[i-1]) / ema8s[i-1] * 100);
          deltaCount++;
        }
      }
      const emaFlatness = deltaCount > 0 ? +(emaDeltas / deltaCount).toFixed(3) : null;

      result.consolidating = true;
      result.label = tf.label;
      result.days = tf.days;
      result.rangePct = +(rangePct * 100).toFixed(1);
      result.rangeHigh = high;
      result.rangeLow = low;
      result.crossovers = crossovers;
      result.emaFlatness = emaFlatness;
      return result; // Return longest matching timeframe
    }
  }

  // Fallback: short-term EMA flatness check
  if (n >= 20) {
    const ema8s = calcEMASeries(cl, 8);
    let emaDeltas = 0, deltaCount = 0;
    for (let i = n - 20; i < n; i++) {
      if (ema8s[i] != null && ema8s[i-1] != null && ema8s[i-1] !== 0) {
        emaDeltas += Math.abs((ema8s[i] - ema8s[i-1]) / ema8s[i-1] * 100);
        deltaCount++;
      }
    }
    const flatness = deltaCount > 0 ? emaDeltas / deltaCount : 999;
    if (flatness < 0.3) {
      const slice20 = cl.slice(-20);
      const h20 = Math.max(...slice20), l20 = Math.min(...slice20);
      result.consolidating = true;
      result.label = "Short-term";
      result.days = 20;
      result.rangePct = +((h20 - l20) / l20 * 100).toFixed(1);
      result.rangeHigh = h20;
      result.rangeLow = l20;
      result.emaFlatness = +flatness.toFixed(3);
    }
  }
  return result;
}

// Return consolidation info for ALL matching timeframes (for boundary display)
function detectAllConsolidations(hist, consolTimeframes) {
  const cl = hist.map(d => d.c);
  const n = cl.length;
  const results = [];
  for (const tf of (consolTimeframes || CONSOL_TIMEFRAMES)) {
    if (n < tf.days) continue;
    const slice = cl.slice(-tf.days);
    const high = Math.max(...slice);
    const low = Math.min(...slice);
    const rangePct = (high - low) / low;
    if (rangePct <= tf.maxRange) {
      const price = cl[n - 1];
      const distToHigh = high > 0 ? ((high - price) / price) * 100 : 0;
      const distToLow = low > 0 ? ((price - low) / price) * 100 : 0;
      results.push({
        label: tf.label, days: tf.days, rangePct: +(rangePct * 100).toFixed(1),
        rangeHigh: +high.toFixed(2), rangeLow: +low.toFixed(2), maxRange: +(tf.maxRange * 100).toFixed(0),
        distToHigh: +distToHigh.toFixed(2), distToLow: +distToLow.toFixed(2),
        nearBreakout: distToHigh <= 2.0, nearBreakdown: distToLow <= 2.0,
        priceInRange: cl[n - 1] <= high && cl[n - 1] >= low,
      });
    }
  }
  return results;
}

// ================================================================
// MAIN CLASSIFY FUNCTION
// ================================================================
function classify(hist, hourlyBars, hadBreakout, consolConfig, skipTurn) {
  if (!hist || hist.length < 22)
    return { stage: 0, direction: "neutral", rvol: 1, ma5: null, ma8: null, ma10: null, ma20: null, ma21: null, ma50: null };

  const cl = hist.map(d => d.c);
  const hi = hist.map(d => d.h);
  const lo = hist.map(d => d.l);
  const op = hist.map(d => d.o);
  const vo = hist.map(d => d.v);
  const n  = cl.length;

  // ── Shared metrics ────────────────────────────────────────────
  const avgV = vo.slice(-21, -1).reduce((s, v) => s + v, 0) / 20;
  const rvol = +(vo[n - 1] / (avgV || 1)).toFixed(2);
  const ema5  = calcEMA(cl, 5);
  const ema8  = calcEMA(cl, 8);
  const ema10 = calcEMA(cl, 10);
  const ema20 = calcEMA(cl, 20);
  const ema21 = calcEMA(cl, 21);
  const ema50 = cl.length >= 50 ? calcEMA(cl, 50) : null;
  const ext   = { rvol, ma5: ema5, ma8: ema8, ma10: ema10, ma20: ema20, ma21: ema21, ma50: ema50 };

  // ── Pre-compute signals used by multiple stages ────────────────
  const rsi14 = calcRSI(cl, 14);
  const consol = detectConsolidation(hist, consolConfig);
  const stackedUp   = ema5 && ema10 && ema20 && ema5 > ema10 && ema10 > ema20;
  const stackedDown = ema5 && ema10 && ema20 && ema5 < ema10 && ema10 < ema20;
  const isTrending  = stackedUp || stackedDown;

  // Volume trend: avg volume last 10 bars vs prior 10 bars (for quality scores)
  const volRecent10 = n >= 20 ? vo.slice(-10).reduce((s,v) => s+v, 0) / 10 : null;
  const volPrior10  = n >= 20 ? vo.slice(-20, -10).reduce((s,v) => s+v, 0) / 10 : null;
  const volContracting = volRecent10 && volPrior10 && volPrior10 > 0 ? volRecent10 < volPrior10 * 0.8 : false;
  const volExpanding   = volRecent10 && volPrior10 && volPrior10 > 0 ? volRecent10 > volPrior10 * 1.3 : false;

  // ================================================================
  // STAGES IN LIFECYCLE ORDER: 1 → 2 → 3 → 4 → 5 → 6
  // ================================================================

  // ── Stage 1: Consolidation ────────────────────────────────────────
  // Sideways range-bound action. Checked first because it's the starting point.
  if (consol.consolidating) {
    const { rangeHigh, rangeLow, label, days } = consol;
    const priceInRange = cl[n - 1] <= rangeHigh && cl[n - 1] >= rangeLow;

    // If price is still INSIDE the range, it's consolidating
    if (priceInRange) {
      // Consolidation quality score (0–3 stars)
      // ★ RSI in neutral zone (38–62) — momentum is flat, not trending
      // ★ Volume contracting — participation drying up (VCP pattern)
      // ★ EMA flatness is tight — EMAs converging, coiling for a move
      const rsiNeutral = rsi14 != null && rsi14 >= 38 && rsi14 <= 62;
      const emasTight = consol.emaFlatness != null && consol.emaFlatness < 0.2;
      const consolQuality = (rsiNeutral ? 1 : 0) + (volContracting ? 1 : 0) + (emasTight ? 1 : 0);
      return {
        stage: 1, direction: "neutral", ...ext, rsi: rsi14,
        consolTimeframe: consol.label, consolDays: consol.days, consolRange: consol.rangePct,
        consolHigh: consol.rangeHigh, consolLow: consol.rangeLow,
        consolCrossovers: consol.crossovers, emaFlatness: consol.emaFlatness,
        consolQuality, rsiNeutral, volContracting, emasTight,
      };
    }

    // ── Stage 2: Breakout / Breakdown ──────────────────────────────
    // Price is outside the consolidation range.
    // Conviction score: RVOL tier + RSI momentum confirmation
    // Touch count: how many times price tested the boundary before breaking
    const consolSlice = cl.slice(-Math.min(days, n));
    const touchHigh = consolSlice.filter(c => c >= rangeHigh * 0.985 && c <= rangeHigh).length;
    const touchLow = consolSlice.filter(c => c <= rangeLow * 1.015 && c >= rangeLow).length;

    if (cl[n - 1] > rangeHigh && rvol >= 0.7) {
      const rsiConfirm = rsi14 != null && rsi14 > 60;
      const conviction = (rvol >= 2.5 ? 3 : rvol >= 1.5 ? 2 : 1) + (rsiConfirm ? 1 : 0);
      return { stage: 2, direction: "up",   pct: +((cl[n-1]/rangeHigh - 1)*100).toFixed(1),
               consolTimeframe: label, consolDays: days, consolRange: consol.rangePct,
               rsi: rsi14, rsiConfirm, conviction, touches: touchHigh, ...ext };
    }
    if (cl[n - 1] < rangeLow && rvol >= 0.7) {
      const rsiConfirm = rsi14 != null && rsi14 < 40;
      const conviction = (rvol >= 2.5 ? 3 : rvol >= 1.5 ? 2 : 1) + (rsiConfirm ? 1 : 0);
      return { stage: 2, direction: "down", pct: +((1 - cl[n-1]/rangeLow)*100).toFixed(1),
               consolTimeframe: label, consolDays: days, consolRange: consol.rangePct,
               rsi: rsi14, rsiConfirm, conviction, touches: touchLow, ...ext };
    }
  }

  // ── Stage 3: Trending ────────────────────────────────────────────
  // EMA 5d > 10d > 20d stacking. Chain = was there a consolidation
  // breakout/breakdown before this trend? Check passed-in flag first,
  // then try to infer from historical bars.
  if (isTrending) {
    const dir = stackedUp ? "up" : "down";
    let chainOk = hadBreakout === true;
    // Infer chain from historical data if not explicitly tracked
    if (!chainOk && n >= 60) {
      // Walk back from ~20 bars ago and look for a consolidation window
      // that the stock subsequently broke out of
      for (let lookback = 20; lookback <= Math.min(n - 20, 120); lookback += 10) {
        const oldSlice = hist.slice(Math.max(0, n - lookback - 30), n - lookback);
        if (oldSlice.length < 20) continue;
        const oldConsol = detectConsolidation(oldSlice, consolConfig);
        if (oldConsol.consolidating) {
          // Was there a breakout from that range?
          const postBreakBars = hist.slice(n - lookback, n - lookback + 5);
          if (postBreakBars.length > 0) {
            const brokeUp = postBreakBars.some(b => b.c > oldConsol.rangeHigh);
            const brokeDown = postBreakBars.some(b => b.c < oldConsol.rangeLow);
            if ((dir === "up" && brokeUp) || (dir === "down" && brokeDown)) {
              chainOk = true;
              break;
            }
          }
        }
      }
    }

    // ── Stage 4 & 5: Exhaustion → Turn ──────────────────────────
    // Two detection modes:
    //   DAILY/WEEKLY: gap-based (≥3 directional gaps + expanding ranges + significant move)
    //   HOURLY: composite (RSI extreme + volume climax + acceleration) — no gaps on intraday
    const isHourlyTf = consolConfig === TF_CONSOL.hourly;
    let isExhausting = false;
    let exhaustDir = dir; // default to trend direction
    let exhaustMeta = {};

    if (isHourlyTf && n >= 20) {
      // ── HOURLY EXHAUSTION: RSI divergence + volume climax + acceleration ──
      const rsi = calcRSI(cl, 14);
      const rsiSeries = calcRSISeries(cl, 14);

      // Signal 1: RSI extreme (>78 or <22) — momentum stretched
      const rsiExtreme = rsi != null && (
        (dir === "up" && rsi > 78) || (dir === "down" && rsi < 22)
      );

      // Signal 1b: RSI divergence — price making new highs/lows but RSI isn't
      let rsiDivergence = false;
      if (rsi != null && n >= 10 && rsiSeries.length >= n) {
        const priceLast5High = Math.max(...cl.slice(-5));
        const pricePrev5High = Math.max(...cl.slice(-10, -5));
        const rsiLast5High = Math.max(...rsiSeries.slice(-5).filter(v => v != null));
        const rsiPrev5High = Math.max(...rsiSeries.slice(-10, -5).filter(v => v != null));
        const priceLast5Low = Math.min(...cl.slice(-5));
        const pricePrev5Low = Math.min(...cl.slice(-10, -5));
        const rsiLast5Low = Math.min(...rsiSeries.slice(-5).filter(v => v != null));
        const rsiPrev5Low = Math.min(...rsiSeries.slice(-10, -5).filter(v => v != null));
        if (dir === "up" && priceLast5High > pricePrev5High && rsiLast5High < rsiPrev5High)
          rsiDivergence = true;
        if (dir === "down" && priceLast5Low < pricePrev5Low && rsiLast5Low > rsiPrev5Low)
          rsiDivergence = true;
      }

      // Signal 2: Volume climax — recent 3 bars avg volume ≥ 2x the 20-bar avg
      const recentVol3 = vo.slice(-3).reduce((s, v) => s + v, 0) / 3;
      const avgVol20 = vo.slice(-23, -3).reduce((s, v) => s + v, 0) / 20;
      const volClimax = avgVol20 > 0 && recentVol3 >= avgVol20 * 2;
      // Also check if bar ranges are wide (bars expanding)
      const recentRange3 = hist.slice(-3).map(d => d.h - d.l).reduce((s, v) => s + v, 0) / 3;
      const priorRange5 = hist.slice(-8, -3).map(d => d.h - d.l).reduce((s, v) => s + v, 0) / 5;
      const barsExpanding = priorRange5 > 0 && recentRange3 > priorRange5 * 1.2;

      // Signal 3: Acceleration — last 5 bars moved more than prior 10 bars
      const moveLast5 = Math.abs(cl[n - 1] - cl[Math.max(0, n - 5)]);
      const movePrior10 = Math.abs(cl[Math.max(0, n - 5)] - cl[Math.max(0, n - 15)]);
      const accelerating = movePrior10 > 0 && moveLast5 > movePrior10 * 0.8;

      // Count how many signals fire (need ≥2 of the composite signals)
      const signals = [
        rsiExtreme || rsiDivergence,
        volClimax && barsExpanding,
        accelerating,
      ];
      const signalCount = signals.filter(Boolean).length;
      isExhausting = signalCount >= 2;
      exhaustMeta = {
        rsi, rsiExtreme, rsiDivergence, volClimax, barsExpanding, accelerating, signalCount,
        recentVolRatio: avgVol20 > 0 ? +(recentVol3 / avgVol20).toFixed(1) : null,
      };

    } else if (n >= 7) {
      // ── DAILY/WEEKLY EXHAUSTION: gap-based detection (original logic) ──
      const sl = hist.slice(-7);
      const gs = [];
      for (let i = 1; i < sl.length; i++) {
        const g = sl[i].o - sl[i - 1].c;
        if (Math.abs(g) / sl[i - 1].c > 0.002) gs.push(g);
      }
      const gu = gs.filter(g => g > 0).length;
      const gd = gs.filter(g => g < 0).length;
      const r5  = hist.slice(-5).map(d => d.h - d.l);
      const rp5 = hist.slice(-10, -5).map(d => d.h - d.l);
      const ar  = r5.reduce((s, v) => s + v, 0) / 5;
      const ap  = rp5.reduce((s, v) => s + v, 0) / 5;
      const expanding = ap > 0 && ar > ap * 1.1;
      const moved     = Math.abs(cl[n - 1] - cl[n - 7]) / cl[n - 7] > 0.03;
      isExhausting = (gu >= 3 || gd >= 3) && expanding && moved;
      exhaustDir = gu >= 3 ? "up" : "down";
    }

    if (isExhausting) {
      // ── Stage 5: The Turn (snapback after exhaustion) ────────
      // Only on shorter timeframes (hourly/daily). Skipped on weekly.
      // Uses 30-min sub-bars for intraday detection on daily TF.
      if (!skipTurn) {
        const trend = exhaustDir;

        if (!isHourlyTf) {
          // INTRADAY path: 30-min bars (first candle after gap) — daily TF only
          if (n >= 4 && hourlyBars && hourlyBars.length > 0) {
            const latestDate = hourlyBars[hourlyBars.length - 1].date;
            const todayBars = hourlyBars.filter(b => b.date === latestDate);
            if (todayBars.length >= 1) {
              const firstBar = todayBars[0];
              const preDayBars = hourlyBars.filter(b => b.date !== latestDate);
              const prevClose = cl[n - 2];
              const ydClose = preDayBars.length > 0 ? preDayBars[preDayBars.length - 1].c : prevClose;
              const gapPct = (firstBar.o - ydClose) / ydClose;
              const gapUp   = gapPct >  0.01 && trend === "up";
              const gapDown = gapPct < -0.01 && trend === "down";
              if (gapUp && firstBar.c < firstBar.o)
                return { stage: 5, direction: "toDown", gapPct: +(gapPct * 100).toFixed(1),
                         intradayDetected: true, wasExhausting: true, ...ext };
              if (gapDown && firstBar.c > firstBar.o)
                return { stage: 5, direction: "toUp", gapPct: +(gapPct * 100).toFixed(1),
                         intradayDetected: true, wasExhausting: true, ...ext };
            }
          }

          // DAILY fallback: gap in exhaustion direction + close reversal
          if (n >= 4) {
            const gapPct = (op[n - 1] - cl[n - 2]) / cl[n - 2];
            if (gapPct >  0.012 && trend === "up"   && cl[n - 1] < op[n - 1])
              return { stage: 5, direction: "toDown", gapPct: +(gapPct * 100).toFixed(1),
                       intradayDetected: false, wasExhausting: true, ...ext };
            if (gapPct < -0.012 && trend === "down"  && cl[n - 1] > op[n - 1])
              return { stage: 5, direction: "toUp",   gapPct: +(gapPct * 100).toFixed(1),
                       intradayDetected: false, wasExhausting: true, ...ext };
          }
        } else {
          // HOURLY Turn: RSI reversal from extreme — last bar reverses direction
          const rsi = exhaustMeta.rsi;
          const lastBar = hist[n - 1];
          const prevBar = hist[n - 2];
          if (rsi != null) {
            // Bearish turn: was exhausting up, last bar closes below open with RSI rolling off high
            if (trend === "up" && lastBar.c < lastBar.o && lastBar.c < prevBar.c)
              return { stage: 5, direction: "toDown", rsi,
                       intradayDetected: true, wasExhausting: true, hourlyExhaust: true, ...exhaustMeta, ...ext };
            // Bullish turn: was exhausting down, last bar closes above open with RSI bouncing off low
            if (trend === "down" && lastBar.c > lastBar.o && lastBar.c > prevBar.c)
              return { stage: 5, direction: "toUp", rsi,
                       intradayDetected: true, wasExhausting: true, hourlyExhaust: true, ...exhaustMeta, ...ext };
          }
        }
      }

      // No turn detected — still exhausting
      return { stage: 4, direction: exhaustDir, wasTrending: true, hourlyExhaust: isHourlyTf,
               ...exhaustMeta, ...ext };
    }

    // ── Stage 4 alternative: Volume capitulation (DOWNSIDE ONLY) ──
    // Asymmetric: blow-off selling at lows is a real phenomenon.
    // Blow-off buying at highs is much rarer — tops grind, bottoms crash.
    // Triggers on a single bar with: trending down + volume ≥ 3x avg +
    // wide-range bar (≥1.5x avg range) + RSI below 25.
    // Does NOT require multiple gaps — one capitulation bar is enough.
    if (!isHourlyTf && dir === "down" && n >= 20) {
      const lastVol = vo[n - 1];
      const avgVol20 = vo.slice(-21, -1).reduce((s, v) => s + v, 0) / 20;
      const lastRange = hi[n - 1] - lo[n - 1];
      const avgRange10 = hist.slice(-11, -1).map(d => d.h - d.l).reduce((s, v) => s + v, 0) / 10;
      const volSpike = avgVol20 > 0 && lastVol >= avgVol20 * 3;
      const wideBar = avgRange10 > 0 && lastRange >= avgRange10 * 1.5;
      const rsiCapit = rsi14 != null && rsi14 < 25;
      // Need volume spike + at least one of (wide bar, RSI extreme)
      if (volSpike && (wideBar || rsiCapit)) {
        const capitMeta = {
          capitulation: true, volSpike: +(lastVol / avgVol20).toFixed(1),
          wideBar, rsiCapit, rsi: rsi14,
        };

        // Check for immediate turn (capitulation reversal):
        // If the last bar closed in the upper half of its range, the selling
        // was absorbed — potential hammer / reversal bar
        if (!skipTurn) {
          const closeInUpperHalf = lastRange > 0 && (cl[n-1] - lo[n-1]) / lastRange > 0.55;
          if (closeInUpperHalf) {
            return { stage: 5, direction: "toUp", ...capitMeta,
                     intradayDetected: false, wasExhausting: true, ...ext };
          }
        }

        return { stage: 4, direction: "down", wasTrending: true, ...capitMeta, ...ext };
      }
    }

    // ── Stage 6: Follow-Through (confirmation after a turn) ──────
    if (n >= 6) {
      const rng = hi[n - 1] - lo[n - 1];
      const nH  = rng > 0 && (cl[n - 1] - lo[n - 1]) / rng > 0.72;
      const nL  = rng > 0 && (cl[n - 1] - lo[n - 1]) / rng < 0.28;
      const pt  = cl[n - 5] > cl[Math.max(0, n - 10)] ? "up" : "down";
      if (pt === "down" && cl[n - 1] > cl[n - 4] && nH && rvol > 1.05)
        return { stage: 6, direction: "up",   ...ext };
      if (pt === "up"   && cl[n - 1] < cl[n - 4] && nL && rvol > 1.05)
        return { stage: 6, direction: "down", ...ext };
    }

    // Still trending, no exhaustion/turn/follow-through detected
    return { stage: 3, direction: dir, chainConfirmed: chainOk,
             emaStack: stackedUp ? "5>10>20" : "5<10<20", ...ext };
  }

  // ── Stage 4 exception: massive move without EMA stacking ────────
  // Only if the stock moved ≥30% in ~2 weeks — pace is unsustainable
  // even without classic EMA stacking (e.g., parabolic biotech)
  if (n >= 10) {
    const move2w = Math.abs(cl[n - 1] - cl[n - 10]) / cl[n - 10];
    if (move2w >= 0.30) {
      const dir = cl[n - 1] > cl[n - 10] ? "up" : "down";
      return { stage: 4, direction: dir, wasTrending: false,
               massiveMove: +(move2w * 100).toFixed(1), ...ext };
    }
  }

  // ── Hibernation: doesn't fit any stage ─────────────────────────
  // Not consolidating in a defined range, not trending, not breaking out.
  return { stage: 0, direction: "neutral", ...ext };
}

const FEEDBACK_KEY = "stageTracker_feedback_v1";

function loadFeedback() {
  try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || "[]"); }
  catch { return []; }
}
function saveFeedback(fb) {
  try { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(fb.slice(-200))); }
  catch {}
}

function captureSnapshot(analysis, price) {
  if (!analysis) return null;
  const a = analysis;
  return {
    rvol: a.rvol ?? null, price: price ?? null, autoStage: a.stage, direction: a.direction,
    pVsMa5:     a.ma5 && price ? +(price / a.ma5 - 1).toFixed(4) : null,
    pVsMa10:    a.ma10 && price ? +(price / a.ma10 - 1).toFixed(4) : null,
    pVsMa20:    a.ma20 && price ? +(price / a.ma20 - 1).toFixed(4) : null,
    pVsMa50:    a.ma50 && price ? +(price / a.ma50 - 1).toFixed(4) : null,
    ma5VsMa10:  a.ma5 && a.ma10 ? +(a.ma5 / a.ma10 - 1).toFixed(4) : null,
    ma10VsMa20: a.ma10 && a.ma20 ? +(a.ma10 / a.ma20 - 1).toFixed(4) : null,
    ma5VsMa20:  a.ma5 && a.ma20 ? +(a.ma5 / a.ma20 - 1).toFixed(4) : null,
  };
}

function snapshotDistance(a, b) {
  if (!a || !b) return Infinity;
  const fields = ["pVsMa5","pVsMa10","pVsMa20","pVsMa50","ma5VsMa10","ma10VsMa20","ma5VsMa20","rvol"];
  let sum = 0, count = 0;
  for (const f of fields) {
    if (a[f] != null && b[f] != null) {
      const scale = f === "rvol" ? 0.5 : 1;
      sum += Math.pow((a[f] - b[f]) * scale, 2);
      count++;
    }
  }
  if (count < 3) return Infinity;
  return Math.sqrt(sum / count);
}

function queryFeedback(currentSnap) {
  const fb = loadFeedback();
  if (fb.length === 0 || !currentSnap) return null;
  let bestMatch = null, bestDist = Infinity;
  for (const entry of fb) {
    if (entry.snapshot?.autoStage !== currentSnap.autoStage) continue;
    const dist = snapshotDistance(currentSnap, entry.snapshot);
    if (dist < 0.015 && dist < bestDist) { bestDist = dist; bestMatch = entry; }
  }
  if (!bestMatch) return null;
  const ageDays = (Date.now() - (bestMatch.ts || 0)) / 86400000;
  const recencyBoost = Math.max(0.5, 1 - ageDays / 90);
  const agreeing = fb.filter(e =>
    e.snapshot?.autoStage === currentSnap.autoStage &&
    e.toStage === bestMatch.toStage &&
    snapshotDistance(currentSnap, e.snapshot) < 0.025
  ).length;
  return { stage: bestMatch.toStage, confidence: Math.min(0.95, (0.6 + agreeing * 0.1) * recencyBoost),
           reason: bestMatch.reason, distance: +bestDist.toFixed(4), agreeing };
}

function recordFeedback(sym, fromStage, toStage, reason, snapshot, timeframe) {
  const fb = loadFeedback();
  fb.push({ sym, fromStage, toStage, reason, snapshot, timeframe: timeframe || "daily", ts: Date.now(), date: new Date().toISOString().slice(0, 10) });
  saveFeedback(fb);
}

function parseChart(js, dateOnly) {
  const r = js?.chart?.result?.[0];
  if (!r) return { bars: [], meta: {} };
  const meta = r.meta;
  const ts = r.timestamp || [];
  const q = r.indicators?.quote?.[0] || {};
  const bars = ts.map((t, i) => {
    const d = new Date(t * 1000);
    return { date: d.toISOString().slice(0, 10), ts: t, hour: d.getHours(), min: d.getMinutes(),
             o: q.open?.[i], h: q.high?.[i], l: q.low?.[i], c: q.close?.[i], v: q.volume?.[i] };
  }).filter(d => d.c != null && d.c > 0 && d.o != null);
  return { bars, meta };
}

const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];
let activeProxyIdx = 0;

function fetchWithTimeout(url, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

async function fetchViaProxy(url, timeoutMs = 25000, expectJson = false) {
  const startIdx = activeProxyIdx;
  let lastErr = null;
  for (let attempt = 0; attempt < CORS_PROXIES.length; attempt++) {
    const idx = (startIdx + attempt) % CORS_PROXIES.length;
    const proxyUrl = CORS_PROXIES[idx](url);
    try {
      const res = await fetchWithTimeout(proxyUrl, timeoutMs);
      if (!res.ok) {
        console.warn(`Proxy ${idx} HTTP ${res.status}`);
        lastErr = new Error(`HTTP ${res.status}`);
        continue;
      }
      // When we expect JSON, clone & peek at the body to catch HTML error pages
      if (expectJson) {
        const clone = res.clone();
        const text = await clone.text();
        const trimmed = text.trimStart();
        // Valid JSON starts with { or [, not < (HTML) or letters (error pages)
        if (!trimmed.startsWith("{") && !trimmed.startsWith("[")) {
          const preview = trimmed.slice(0, 60).replace(/\n/g, " ");
          console.warn(`Proxy ${idx} returned non-JSON: "${preview}"`);
          lastErr = new Error(`Proxy returned HTML/text instead of JSON`);
          continue;
        }
      }
      activeProxyIdx = idx;
      return res;
    } catch (e) {
      console.warn(`Proxy ${idx} failed:`, e.message);
      lastErr = e;
    }
  }
  throw lastErr || new Error("All CORS proxies failed");
}

let yahooAuth = { crumb: null, fetched: false, ts: 0 };

async function getYahooCrumb() {
  if (yahooAuth.fetched && Date.now() - yahooAuth.ts < 600000) return yahooAuth.crumb;
  try {
    const res = await fetchViaProxy("https://query2.finance.yahoo.com/v1/test/getcrumb", 10000);
    const text = await res.text();
    if (text && text.length < 50 && !text.includes("<")) {
      yahooAuth = { crumb: text.trim(), fetched: true, ts: Date.now() };
      return yahooAuth.crumb;
    }
  } catch (e) { console.warn("Crumb fetch failed:", e.message); }
  try {
    const res = await fetchViaProxy("https://finance.yahoo.com/quote/SPY", 12000);
    const html = await res.text();
    const match = html.match(/"crumb"\s*:\s*"([^"]+)"/);
    if (match) { yahooAuth = { crumb: match[1], fetched: true, ts: Date.now() }; return yahooAuth.crumb; }
  } catch (e) { console.warn("Page crumb failed:", e.message); }
  yahooAuth = { crumb: null, fetched: true, ts: Date.now() };
  return null;
}

function yahooChartUrl(sym, range, interval) {
  let url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=${range}&interval=${interval}&includePrePost=false`;
  if (yahooAuth.crumb) url += `&crumb=${encodeURIComponent(yahooAuth.crumb)}`;
  return url;
}

  return parsed;

async function fetchTicker(sym) {
  await getYahooCrumb();
  const [dailyResult, hourlyResult, weeklyResult, turnResult] = await Promise.allSettled([
    fetchDaily(sym), fetchHourlyFull(sym), fetchWeekly(sym), fetch30Min(sym)
  ]);
  if (dailyResult.status !== "fulfilled") throw dailyResult.reason || new Error("Daily fetch failed");
  const { bars: hist, meta } = dailyResult.value;
  const hourlyBars = hourlyResult.status === "fulfilled" ? hourlyResult.value.bars : [];
  const weeklyBars = weeklyResult.status === "fulfilled" ? weeklyResult.value.bars : [];
  const turnBars   = turnResult.status === "fulfilled" ? turnResult.value.bars : [];
  const prev  = meta.chartPreviousClose ?? meta.previousClose ?? (hist.length > 1 ? hist[hist.length-2].c : null);
  const price = meta.regularMarketPrice ?? (hist.length ? hist[hist.length-1].c : null);
  const chg   = price != null && prev != null ? price - prev : null;
  const pct   = chg != null && prev ? (chg / prev) * 100 : null;
  const now = Date.now();
  // Daily classify uses 30-min bars for turn detection
  const analysis = classify(hist, turnBars.length > 0 ? turnBars : null);
  analysis.classifiedAt = now;
  analysis.classifiedPrice = price;
  // Hourly classify — turn detection uses bar-level gaps (no sub-bars)
  const hourlyAnalysis = hourlyBars.length >= 22 ? classify(hourlyBars, null, false, TF_CONSOL.hourly) : null;
  if (hourlyAnalysis) { hourlyAnalysis.classifiedAt = now; hourlyAnalysis.classifiedPrice = price; }
  // Weekly classify — turn detection skipped (too slow for snapbacks)
  const weeklyAnalysis = weeklyBars.length >= 22 ? classify(weeklyBars, null, false, TF_CONSOL.weekly, true) : null;
  if (weeklyAnalysis) { weeklyAnalysis.classifiedAt = now; weeklyAnalysis.classifiedPrice = price; }
  // Consolidation boundaries for all matching timeframes
  const consolBounds = {
    daily: detectAllConsolidations(hist),
    hourly: hourlyBars.length >= 22 ? detectAllConsolidations(hourlyBars, TF_CONSOL.hourly) : [],
    weekly: weeklyBars.length >= 22 ? detectAllConsolidations(weeklyBars, TF_CONSOL.weekly) : [],
  };
  // Pre/post market prices from Yahoo meta
  const preMarket = meta.preMarketPrice ? {
    price: meta.preMarketPrice,
    chg: meta.preMarketChange ?? null,
    pct: meta.preMarketChangePercent ? +(meta.preMarketChangePercent * 100).toFixed(2) : null,
    time: meta.preMarketTime ? new Date(meta.preMarketTime * 1000) : null,
  } : null;
  const postMarket = meta.postMarketPrice ? {
    price: meta.postMarketPrice,
    chg: meta.postMarketChange ?? null,
    pct: meta.postMarketChangePercent ? +(meta.postMarketChangePercent * 100).toFixed(2) : null,
    time: meta.postMarketTime ? new Date(meta.postMarketTime * 1000) : null,
  } : null;

  return { sym, price, prev, chg, pct, volume: meta.regularMarketVolume,
    avgVol: meta.averageDailyVolume10Day ?? meta.averageDailyVolume3Month,
    hist, hourlyBars, weeklyBars, turnBars, analysis, hourlyAnalysis, weeklyAnalysis,
    consolBounds, preMarket, postMarket,
    autoStage: analysis.stage, loaded: true, err: null, ts: Date.now() };
}

function getETInfo() {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const h = et.getHours(), m = et.getMinutes(), day = et.getDay();
  const mins = h * 60 + m;
  const isWeekday = day >= 1 && day <= 5;
  return {
    isMarketOpen: isWeekday && mins >= 570 && mins <= 960,
    isFirstWindow: isWeekday && mins >= 625 && mins <= 690,
    isMorning: isWeekday && mins >= 570 && mins <= 720,
    etTime: `${h}:${m.toString().padStart(2,"0")} ET`,
  };
}

            <span style={{ fontSize:"18px", fontWeight:"700", color:"#f8fafc" }}>${fmtP(d.price)}</span>
            <span style={{ fontSize:"12px", fontWeight:"700", color: up?"#4ade80":"#f87171" }}>
              {up?"▲":"▼"}{Math.abs(d.pct).toFixed(2)}%
            </span>
          </div>
          {(d.preMarket || d.postMarket) && (
            <div style={{ fontSize:"9px", marginTop:"1px", color:"#64748b" }}>
              {d.preMarket && (
                <span style={{ marginRight:"8px" }}>
                  <span style={{ color:"#475569" }}>Pre:</span>{" "}
                  <span style={{ fontWeight:"700" }}>${fmtP(d.preMarket.price)}</span>
                  {d.preMarket.pct != null && (
                    <span style={{ color: d.preMarket.pct >= 0 ? "#4ade80" : "#f87171", marginLeft:"3px" }}>
                      {d.preMarket.pct >= 0 ? "+" : ""}{d.preMarket.pct}%
                    </span>
                  )}
                </span>
              )}
              {d.postMarket && (
                <span>
                  <span style={{ color:"#475569" }}>Post:</span>{" "}
                  <span style={{ fontWeight:"700" }}>${fmtP(d.postMarket.price)}</span>
                  {d.postMarket.pct != null && (
                    <span style={{ color: d.postMarket.pct >= 0 ? "#4ade80" : "#f87171", marginLeft:"3px" }}>
                      {d.postMarket.pct >= 0 ? "+" : ""}{d.postMarket.pct}%
                    </span>
                  )}
                </span>
              )}
            </div>
          )}
        </div>
      ) : (
        <div style={{ fontSize:"11px", color: d?.err?"#ef4444":"#475569", marginTop:"4px", wordBreak:"break-word" }}>
          {d?.err ? `⚠ ${d.err}` : isLoading ? "Loading…" : "No data"}
        </div>
      )}

      <div style={{ marginTop:"8px", display:"flex", alignItems:"center", gap:"6px" }}>
        <span style={{
          display:"inline-flex", alignItems:"center", gap:"4px",
          padding:"3px 9px", borderRadius:"4px", fontSize:"11px", fontWeight:"800",
          background:`${s.color}18`, border:`1px solid ${s.border}`, color:s.color,
        }}>
          {s.icon} S{effStage}: {s.name}
        </span>
        {viewTf && viewTf !== "daily" && (
          <span style={{ fontSize:"9px", color:"#475569", fontWeight:"700", textTransform:"uppercase" }}>{viewTf}</span>
        )}
      </div>
      <div style={{ color:"#64748b", fontSize:"10px", marginTop:"1px" }}>{s.strategy}</div>
      {an?.classifiedAt && (
        <div style={{ fontSize:"9px", color:"#475569", marginTop:"1px" }}>
          {fmtTime(an.classifiedAt)}{an.classifiedPrice != null && ` @ $${fmtP(an.classifiedPrice)}`}
        </div>
      )}
      {noTfData && (
        <div style={{ fontSize:"9px", color:"#475569", marginTop:"2px", fontStyle:"italic" }}>No {viewTf} data</div>
      )}

      {effStage === 1 && an?.consolTimeframe && (
        <div style={{ fontSize:"10px", marginTop:"2px", color:"#94a3b8" }}>
          {an.consolTimeframe} range · {an.consolRange}%
          {an.consolQuality != null && (
            <span style={{ marginLeft:"6px", color: an.consolQuality >= 3 ? "#22c55e" : an.consolQuality >= 2 ? "#fbbf24" : "#475569" }}>
              {"★".repeat(an.consolQuality)}{"☆".repeat(3 - an.consolQuality)}
            </span>
          )}
          {an.consolHigh && an.consolLow && (
            <div style={{ fontSize:"9px", color:"#64748b", marginTop:"1px" }}>
              <span style={{ color:"#f87171" }}>${fmtP(an.consolLow)}</span>
              {" — "}
              <span style={{ color:"#4ade80" }}>${fmtP(an.consolHigh)}</span>
              {an.volContracting && <span style={{ marginLeft:"4px", color:"#22c55e" }}>Vol↓</span>}
              {an.rsi != null && <span style={{ marginLeft:"4px", color:"#475569" }}>RSI {an.rsi}</span>}
            </div>
          )}
        </div>
      )}
      {effStage === 2 && an?.consolTimeframe && (
        <div style={{ fontSize:"10px", marginTop:"2px", color: an?.direction === "up" ? "#4ade80" : "#f87171" }}>
          {an?.direction === "up" ? "▲" : "▼"} Breaking {an.consolTimeframe} range {an?.pct && `+${an.pct}%`}
          {an?.conviction != null && (
            <span style={{ marginLeft:"6px", fontSize:"9px", color: an.conviction >= 3 ? "#22c55e" : an.conviction >= 2 ? "#fbbf24" : "#64748b", fontWeight:"800" }}>
              {an.conviction >= 3 ? "HIGH" : an.conviction >= 2 ? "MED" : "LOW"}
            </span>
          )}
          {an?.rsi != null && <span style={{ fontSize:"9px", marginLeft:"4px", color:"#475569" }}>RSI {an.rsi}</span>}
          <div style={{ fontSize:"9px", color:"#64748b", marginTop:"1px" }}>
            {an?.touches != null && an.touches > 0 && (
              <span style={{ color: an.touches >= 3 ? "#22c55e" : "#94a3b8", marginRight:"8px" }}>
                {an.touches}x tested
              </span>
            )}
            {relStrength != null && (
              <span style={{ color: relStrength > 1.5 ? "#22c55e" : relStrength > 1.0 ? "#94a3b8" : "#f87171" }}>
                RS {relStrength}x
              </span>
            )}
          </div>
        </div>
      )}
      {effStage === 3 && (
        <div style={{ fontSize:"10px", marginTop:"2px", color: an?.chainConfirmed ? "#38bdf8" : "#fbbf24" }}>
          {an?.direction === "up" ? "▲ Trending higher" : "▼ Trending lower"}
          {an?.emaStack && ` · ${an.emaStack}`}
          {an?.chainConfirmed != null && (an.chainConfirmed ? " ✓" : " ⚠ No chain")}
        </div>
      )}
      {effStage === 4 && (
        <div style={{ fontSize:"10px", marginTop:"2px", color:"#f59e0b" }}>
          {an?.direction === "up" ? "▲ Exhausting higher" : "▼ Exhausting lower"}
          {an?.massiveMove ? ` · ${an.massiveMove}% in 2wk` : ""}
          {an?.capitulation && (
            <div style={{ fontSize:"9px", color:"#ef4444", marginTop:"1px", fontWeight:"700" }}>
              💥 Capitulation · Vol {an.volSpike}x avg
              {an.rsi != null && ` · RSI ${an.rsi}`}
              {an.wideBar && " · Wide bar"}
            </div>
          )}
          {an?.hourlyExhaust && (
            <div style={{ fontSize:"9px", color:"#d97706", marginTop:"1px" }}>
              {an.rsi != null && `RSI ${an.rsi}`}
              {an.volClimax && ` · Vol ${an.recentVolRatio}x`}
              {an.accelerating && " · Accel"}
              {an.rsiDivergence && " · Divergence"}
            </div>
          )}
        </div>
      )}
      {effStage === 5 && (
        <div style={{ fontSize:"10px", marginTop:"2px", color:"#ef4444" }}>
          Snapback {an?.gapPct ? `gap ${an.gapPct}%` : ""} · Post-exhaustion
        </div>
      )}
      {an?.learnedOverride && (
        <div style={{ fontSize:"10px", marginTop:"2px", color:"#22c55e" }}>🧠 Learned</div>
      )}

      {(d?.hourlyAnalysis || d?.weeklyAnalysis) && (() => {
        const hs = d?.hourlyAnalysis?.stage, ws = d?.weeklyAnalysis?.stage, ds = effStage;
        const hasAll = hs != null && ws != null;
        const allSame = hasAll && hs === ds && ds === ws;
        const twoMatch = hasAll && (hs === ds || ds === ws || hs === ws);
        return (
          <div style={{ display:"flex", gap:"3px", marginTop:"4px", fontSize:"9px", fontWeight:"700", alignItems:"center", flexWrap:"wrap" }}>
            {hs != null && <span style={{ color: STAGES[hs]?.color || "#475569", background:`${STAGES[hs]?.color || "#475569"}15`, padding:"1px 5px", borderRadius:"3px" }}>H:S{hs}</span>}
            <span style={{ color: STAGES[ds]?.color || "#475569", background:`${STAGES[ds]?.color || "#475569"}15`, padding:"1px 5px", borderRadius:"3px" }}>D:S{ds}</span>
            {ws != null && <span style={{ color: STAGES[ws]?.color || "#475569", background:`${STAGES[ws]?.color || "#475569"}15`, padding:"1px 5px", borderRadius:"3px" }}>W:S{ws}</span>}
            {twoMatch && <span style={{ color: allSame ? "#22c55e" : "#fbbf24", marginLeft:"2px" }}>{allSame ? "★★★" : "★★"}</span>}
          </div>
        );
      })()}

      {rv != null && (
        <div style={{ fontSize:"10px", marginTop:"3px",
          color: rv > 2 ? "#ef4444" : rv > 1.5 ? "#fbbf24" : rv > 0.7 ? "#64748b" : "#334155",
        }}>
          RVOL {rv}x
          {relStrength != null && effStage !== 2 && (
            <span style={{ marginLeft:"6px", fontSize:"9px", color: relStrength > 1.5 ? "#22c55e" : relStrength > 1.0 ? "#94a3b8" : relStrength < 0.5 ? "#ef4444" : "#64748b" }}>
              RS {relStrength}x
            </span>
          )}
          {dir && dir !== "neutral" && (
            <span style={{ marginLeft:"6px", color: (dir==="down"||dir==="toDown")?"#f87171":"#4ade80" }}>
              {(dir==="down"||dir==="toDown") ? "▼" : "▲"}
            </span>
          )}
        </div>
      )}

      {showNearBreak && d?.consolBounds && (() => {
        const allBounds = [...(d.consolBounds.daily || []), ...(d.consolBounds.hourly || []), ...(d.consolBounds.weekly || [])];
        const near = allBounds.filter(b => b.priceInRange && (b.nearBreakout || b.nearBreakdown));
        if (near.length === 0) return null;
        return (
          <div style={{ marginTop:"4px", fontSize:"9px" }}>
            {near.slice(0, 3).map(b => (
              <div key={b.label} style={{ color: b.nearBreakout ? "#22c55e" : "#ef4444", fontWeight:"700" }}>
                {b.nearBreakout ? `↑ ${b.distToHigh}% to $${b.rangeHigh}` : `↓ ${b.distToLow}% to $${b.rangeLow}`}
                <span style={{ color:"#475569", fontWeight:"400" }}> ({b.label})</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

// ================================================================
// DETAIL MODAL
// ================================================================
function DetailModal({ sym, d, effStage, isManual, setOverrides, onRecordFeedback, feedbackHint, onClose, refreshAllTickers, overrides: ovObj, relStrength }) {
  const s  = STAGES[effStage] || STAGES[1];
  const an = d?.analysis;
  const up = d?.pct >= 0;
  const [pendingStage, setPendingStage] = useState(null);
  const [overrideTf, setOverrideTf]     = useState("daily");
  const [reason, setReason]             = useState("");
  const [showFeedbackLog, setShowFeedbackLog] = useState(false);

  const applyOverride = () => {
    if (pendingStage == null || !reason.trim()) return;
    const tfAnalysis = overrideTf === "hourly" ? d?.hourlyAnalysis : overrideTf === "weekly" ? d?.weeklyAnalysis : an;
    onRecordFeedback(sym, tfAnalysis?.stage || effStage, pendingStage, reason.trim(), captureSnapshot(tfAnalysis || an, d?.price), overrideTf);
    setOverrides(p => {
      const existing = p[sym];
      const prev = (existing != null && typeof existing === "object") ? existing : {};
      return { ...p, [sym]: { ...prev, [overrideTf]: pendingStage } };
    });
    setPendingStage(null);
    setReason("");
    // Refresh all tickers with new feedback context
    if (refreshAllTickers) refreshAllTickers();
    onClose();
  };

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.78)",
      zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px",
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"#0c1120", border:`1px solid ${s.border}`,
        borderRadius:"14px", width:"100%", maxWidth:"520px",
        maxHeight:"90vh", overflowY:"auto",
        boxShadow:`0 0 50px ${s.glow}`, padding:"26px",
      }}>
        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <span style={{ fontSize:"26px", fontWeight:"900", letterSpacing:"0.05em" }}>{sym}</span>
            {d?.price != null && <>
              <span style={{ marginLeft:"12px", fontSize:"20px", fontWeight:"600" }}>${fmtP(d.price)}</span>
              <span style={{ marginLeft:"8px", fontSize:"14px", fontWeight:"700", color:up?"#4ade80":"#f87171" }}>
                {up?"▲":"▼"}{Math.abs(d.pct).toFixed(2)}%
              </span>
            </>}
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#64748b", cursor:"pointer", fontSize:"24px" }}>✕</button>
        </div>

        {/* Stage panel */}
        <div style={{ marginTop:"16px", padding:"16px", background:`${s.color}10`, border:`1px solid ${s.border}55`, borderRadius:"10px" }}>
          <div style={{ color:s.color, fontWeight:"800", fontSize:"15px" }}>
            {s.icon} Stage {effStage}: {s.name}
            {isManual && <span style={{ fontSize:"11px", color:"#94a3b8", fontWeight:"400", marginLeft:"8px" }}>(manual)</span>}
          </div>
          <div style={{ color:"#94a3b8", marginTop:"6px", fontSize:"12px", lineHeight:1.6 }}>{s.desc}</div>
          <div style={{ marginTop:"8px", fontSize:"12px" }}>
            <span style={{ color:"#64748b" }}>Strategy: </span>
            <span style={{ color:"#e2e8f0", fontWeight:"700" }}>{s.strategy}</span>
          </div>
        </div>

        {/* TradingView Chart */}
        <div style={{ marginTop:"14px", borderRadius:"10px", overflow:"hidden", border:"1px solid #1e293b" }}>
          <iframe
            src={`https://s.tradingview.com/widgetembed/?frameElementId=tv_${sym}&symbol=${encodeURIComponent(sym)}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=0&toolbarbg=0c1120&studies=RSI%40tv-basicstudies&theme=dark&style=1&timezone=America%2FNew_York&withdateranges=1&showpopupbutton=1&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&showpopupbutton=1&locale=en&utm_source=&utm_medium=widget&utm_campaign=chart`}
            style={{ width:"100%", height:"380px", border:"none", display:"block" }}
            allowTransparency="true"
            allowFullScreen
          />
        </div>

        {/* Multi-Timeframe Analysis */}
        <div style={{ marginTop:"14px" }}>
          <div style={{ fontSize:"11px", fontWeight:"700", color:"#94a3b8", marginBottom:"8px" }}>Multi-Timeframe Stages</div>
          {[
            { label: "Hourly",  a: d?.hourlyAnalysis, tfKey: "hourly" },
            { label: "Daily",   a: an, tfKey: "daily" },
            { label: "Weekly",  a: d?.weeklyAnalysis, tfKey: "weekly" },
          ].map(tf => {
            const ov = ovObj?.[sym];
            const tfOverride = ov && typeof ov === "object" ? ov[tf.tfKey] : (typeof ov === "number" && tf.tfKey === "daily" ? ov : null);
            const a = tf.a;
            const displayStage = tfOverride != null ? tfOverride : a?.stage;
            const stg = displayStage != null ? (STAGES[displayStage] || STAGES[0]) : (a ? (STAGES[a.stage] || STAGES[0]) : null);
            return (
              <div key={tf.label} style={{
                display:"flex", alignItems:"center", gap:"10px",
                padding:"8px 12px", marginBottom:"4px", borderRadius:"8px",
                background: stg ? `${stg.color}08` : "#0d1324",
                border: `1px solid ${stg ? stg.border + "33" : "#1e293b"}`,
              }}>
                <span style={{ fontSize:"11px", color:"#64748b", fontWeight:"700", width:"50px", flexShrink:0 }}>{tf.label}</span>
                {a ? (<>
                  <span style={{
                    padding:"2px 8px", borderRadius:"4px", fontSize:"11px", fontWeight:"800",
                    background:`${stg.color}18`, border:`1px solid ${stg.border}`, color:stg.color, flexShrink:0,
                  }}>{stg.icon} S{displayStage != null ? displayStage : a.stage}{tfOverride != null && " ✎"}</span>
                  <span style={{ fontSize:"11px", color:"#94a3b8", flex:1 }}>
                    {a.direction === "up" ? "▲" : a.direction === "down" ? "▼" : "—"} {stg.name}
                    {a.emaStack ? ` · ${a.emaStack}` : ""}
                    {a.consolTimeframe ? ` · ${a.consolTimeframe}` : ""}
                    {a.chainConfirmed === true ? " ✓" : ""}
                  </span>
                  <span style={{ fontSize:"10px", color:"#475569", flexShrink:0 }}>
                    RVOL {a.rvol}x
                  </span>
                  {a.classifiedAt && (
                    <span style={{ fontSize:"9px", color:"#334155", flexShrink:0 }}>
                      {fmtTime(a.classifiedAt)}{a.classifiedPrice != null ? ` @$${fmtP(a.classifiedPrice)}` : ""}
                    </span>
                  )}
                </>) : (
                  <span style={{ fontSize:"11px", color:"#334155" }}>Insufficient data</span>
                )}
              </div>
            );
          })}
          {an && d?.hourlyAnalysis && d?.weeklyAnalysis && (() => {
            const stages = [d.hourlyAnalysis.stage, an.stage, d.weeklyAnalysis.stage];
            const allSame = stages[0] === stages[1] && stages[1] === stages[2];
            const twoMatch = stages[0] === stages[1] || stages[1] === stages[2] || stages[0] === stages[2];
            if (!twoMatch) return null;
            const matchStage = allSame ? stages[0] : (stages[0]===stages[1] ? stages[0] : (stages[1]===stages[2] ? stages[1] : stages[0]));
            const mstg = STAGES[matchStage];
            return (
              <div style={{
                marginTop:"4px", padding:"8px 12px", borderRadius:"8px",
                background: allSame ? `${mstg.color}12` : "#111827",
                border: `1px solid ${allSame ? mstg.border : "#334155"}`,
              }}>
                <span style={{ color: allSame ? "#22c55e" : "#fbbf24", fontWeight:"800", fontSize:"11px" }}>
                  {allSame ? "★★★ Triple Confluence" : "★★ Dual Confluence"}
                </span>
                <span style={{ color:"#94a3b8", marginLeft:"8px", fontSize:"11px" }}>
                  {allSame
                    ? `All timeframes show S${matchStage}: ${mstg.name} — strongest signal`
                    : `Two timeframes agree on S${matchStage}: ${mstg.name}`}
                </span>
              </div>
            );
          })()}
        </div>

        {/* Stats */}
        {an && (
          <div style={{ marginTop:"14px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"8px" }}>
            {[
              ["RVOL", `${an.rvol}x`, an.rvol>2?"#ef4444":an.rvol>1.5?"#fbbf24":"#94a3b8"],
              relStrength != null ? ["RS vs SPY", `${relStrength}x`, relStrength>1.5?"#22c55e":relStrength>1.0?"#94a3b8":"#f87171"] : null,
              an.touches != null ? ["Touches", `${an.touches}x`, an.touches>=3?"#22c55e":"#94a3b8"] : null,
              ["EMA 5d", an.ma5 ? `$${fmtP(an.ma5)}` : "—", "#94a3b8"],
              ["EMA 10d", an.ma10 ? `$${fmtP(an.ma10)}` : "—", "#94a3b8"],
              ["EMA 20d", an.ma20 ? `$${fmtP(an.ma20)}` : "—", "#94a3b8"],
              ["EMA 8d", an.ma8 ? `$${fmtP(an.ma8)}` : "—", "#64748b"],
              ["EMA 21d", an.ma21 ? `$${fmtP(an.ma21)}` : "—", "#64748b"],
              ["EMA 50d", an.ma50 ? `$${fmtP(an.ma50)}` : "—", "#64748b"],
              ["Volume", fmtVol(d?.volume), "#94a3b8"],
              ["Avg Vol", fmtVol(d?.avgVol), "#94a3b8"],
              d?.preMarket ? ["Pre-Mkt", `$${fmtP(d.preMarket.price)}${d.preMarket.pct != null ? ` (${d.preMarket.pct >= 0 ? "+" : ""}${d.preMarket.pct}%)` : ""}`, d.preMarket.pct >= 0 ? "#4ade80" : "#f87171"] : null,
              d?.postMarket ? ["Post-Mkt", `$${fmtP(d.postMarket.price)}${d.postMarket.pct != null ? ` (${d.postMarket.pct >= 0 ? "+" : ""}${d.postMarket.pct}%)` : ""}`, d.postMarket.pct >= 0 ? "#4ade80" : "#f87171"] : null,
            ].filter(Boolean).map(([k,v,c]) => (
              <div key={k} style={{ background:"#111827", borderRadius:"8px", padding:"10px 12px" }}>
                <div style={{ color:"#475569", fontSize:"10px", textTransform:"uppercase", letterSpacing:"0.06em" }}>{k}</div>
                <div style={{ color:c, fontWeight:"700", marginTop:"4px", fontSize:"13px" }}>{v}</div>
              </div>
            ))}
          </div>
        )}

        {/* Consolidation boundaries — ALL timeframes */}
        {d?.consolBounds && (d.consolBounds.daily.length > 0 || d.consolBounds.hourly.length > 0 || d.consolBounds.weekly.length > 0) && (
          <div style={{ marginTop:"12px", padding:"10px 12px", background:"#0e1a30", border:"1px solid #1e293b", borderRadius:"8px" }}>
            <div style={{ fontSize:"11px", fontWeight:"700", color:"#94a3b8", marginBottom:"8px" }}>Consolidation Boundaries</div>
            {[
              { tfLabel: "Hourly", bounds: d.consolBounds.hourly },
              { tfLabel: "Daily", bounds: d.consolBounds.daily },
              { tfLabel: "Weekly", bounds: d.consolBounds.weekly },
            ].filter(t => t.bounds.length > 0).map(tf => (
              <div key={tf.tfLabel} style={{ marginBottom:"8px" }}>
                <div style={{ fontSize:"10px", fontWeight:"700", color:"#64748b", marginBottom:"4px" }}>{tf.tfLabel}</div>
                {tf.bounds.map(b => (
                  <div key={b.label} style={{
                    display:"flex", alignItems:"center", gap:"8px", padding:"5px 8px", marginBottom:"3px",
                    borderRadius:"6px", background:"#111827", border:`1px solid ${b.priceInRange ? "#1e293b" : "#ef444433"}`,
                  }}>
                    <span style={{ fontSize:"10px", color:"#94a3b8", fontWeight:"700", width:"60px", flexShrink:0 }}>{b.label}</span>
                    <span style={{ fontSize:"11px", color:"#f87171", fontWeight:"700" }}>${b.rangeLow}</span>
                    <span style={{ fontSize:"9px", color:"#475569" }}>—</span>
                    <span style={{ fontSize:"11px", color:"#4ade80", fontWeight:"700" }}>${b.rangeHigh}</span>
                    <span style={{ fontSize:"10px", color:"#475569", flex:1, textAlign:"right" }}>{b.rangePct}%</span>
                    {b.nearBreakout && <span style={{ fontSize:"9px", color:"#22c55e", fontWeight:"800" }}>↑{b.distToHigh}%</span>}
                    {b.nearBreakdown && <span style={{ fontSize:"9px", color:"#ef4444", fontWeight:"800" }}>↓{b.distToLow}%</span>}
                    {!b.priceInRange && <span style={{ fontSize:"9px", color:"#ef4444", fontWeight:"800" }}>OUT</span>}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* Legacy consolidation detail for non-S1 stocks that still have consol context */}
        {an && an.consolTimeframe && !(d?.consolBounds?.daily?.length > 0 || d?.consolBounds?.hourly?.length > 0 || d?.consolBounds?.weekly?.length > 0) && (
          <div style={{ marginTop:"12px", padding:"10px 12px", background:"#0e1a30", border:"1px solid #1e293b", borderRadius:"8px" }}>
            <div style={{ fontSize:"11px", fontWeight:"700", color:"#94a3b8", marginBottom:"6px" }}>Consolidation Context</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px" }}>
              {[

// Simple markdown-to-HTML converter
function mdToHtml(md) {
  if (!md) return "";
  let html = md
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>")
    .replace(/^\* (.+)$/gm, "<li>$1</li>")
    .replace(/^- (.+)$/gm, "<li>$1</li>")
    .replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>")
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n{2,}/g, "</p><p>")
    .replace(/\n/g, "<br/>");
  if (!html.startsWith("<")) html = "<p>" + html;
  if (!html.endsWith(">")) html += "</p>";
  return html;
}

async function callLLM(apiKey, provider, systemPrompt, userMessage) {
  if (provider === "openai") {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "gpt-4o",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: userMessage },
        ],
        max_tokens: 8000,
        temperature: 0.4,
      }),
    });
    if (!res.ok) { const e = await res.text(); throw new Error(`OpenAI ${res.status}: ${e.slice(0, 200)}`); }
    const js = await res.json();
    return js.choices?.[0]?.message?.content || "No response.";
  } else {
    // Anthropic Claude
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 8000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMessage }],
      }),
    });
    if (!res.ok) { const e = await res.text(); throw new Error(`Anthropic ${res.status}: ${e.slice(0, 200)}`); }
    const js = await res.json();
    return js.content?.[0]?.text || "No response.";
  }
}

        </div>

        <div style={{ display:"flex", gap:"10px" }}>

            flex:1, padding:"10px 20px", borderRadius:"8px", cursor: (name.trim() && prompt.trim()) ? "pointer" : "not-allowed",
            fontSize:"13px", fontWeight:"800",
            background: (name.trim() && prompt.trim()) ? "#1e4080" : "#111827",
            border: `1px solid ${(name.trim() && prompt.trim()) ? "#3b82f6" : "#334155"}`,

        </div>
      </div>
    </div>
  );
}
