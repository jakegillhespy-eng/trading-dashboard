function StageTrackerPage() {
  const [stocks, setStocks] = useState({});
  const [overrides, setOverrides] = useState({});
  const [inPlay, setInPlay] = useState(INIT_IP);
  const [tab, setTab] = useState("macro");
  const [busy, setBusy] = useState(new Set());
  const [lastRe, setLastRe] = useState(null);
  const [cntDown, setCntDown] = useState(REFRESH_MS);
  const [alerts, setAlerts] = useState([]);
  const [showEdit, setShowEdit] = useState(false);
  const [showAlerts, setShowAlerts] = useState(false);
  const [detail, setDetail] = useState(null);
  const [sortBy, setSortBy] = useState("default");
  const [filterStage, setFilterStage] = useState(null);
  const [viewTf, setViewTf] = useState("daily");
  const [notifState, setNotifState] = useState(typeof Notification !== "undefined" ? Notification.permission : "default");
  const [turnMonitor, setTurnMonitor] = useState(false);
  const [turnLastCheck, setTurnLastCheck] = useState(null);
  const [turnAlerts, setTurnAlerts] = useState([]);
  const [feedbackCount, setFeedbackCount] = useState(loadFeedback().length);

  const prevRef = useRef({});
  const chainRef = useRef({});
  const rTimer = useRef(null);
  const cTimer = useRef(null);
  const nextTs = useRef(Date.now() + REFRESH_MS);
  const overRef = useRef(overrides);
  const turnRef = useRef(null);

  useEffect(()=>{ overRef.current = overrides; }, [overrides]);

  const pushAlert = useCallback((sym, from, to) => {
    const a = { id:`${sym}-${Date.now()}`, sym, from, to, ts:new Date() };
    setAlerts(p => [a, ...p].slice(0, 50));
    if (Notification?.permission === "granted") {
      try { new Notification(`📊 ${sym}: S${from}→S${to}`, { body:`${STAGES[to]?.name} — ${STAGES[to]?.strategy}` }); } catch(_){}
    }
  }, []);

  const handleRecordFeedback = useCallback((sym, fromStage, toStage, reason, snapshot, timeframe) => {
    recordFeedback(sym, fromStage, toStage, reason, snapshot, timeframe);
    setFeedbackCount(loadFeedback().length);
  }, []);

  const fetchBatch = useCallback(async (syms) => {
    setBusy(p => new Set([...p, ...syms]));
    const results = await Promise.allSettled(syms.map(s => fetchTicker(s)));
    setStocks(p => {
      const next = {...p};
      results.forEach((r,i) => {
        const s = syms[i];
        if (r.status === "fulfilled") {
          const data = r.value;
          const rawStage = data.analysis.stage;
          const os = prevRef.current[s];
          if (os === 1 && rawStage === 2) chainRef.current[s] = true;
          if (rawStage === 1) chainRef.current[s] = false;

          if (rawStage === 3 && data.hist) {
            data.analysis = classify(data.hist, data.turnBars || data.hourlyBars, chainRef.current[s] === true);
          }

          // Carry forward classification timestamps if stage unchanged
          const prev_data = p[s];
          if (prev_data) {
            // Daily
            if (prev_data.analysis?.stage === data.analysis.stage && prev_data.analysis?.classifiedAt) {
              data.analysis.classifiedAt = prev_data.analysis.classifiedAt;
              data.analysis.classifiedPrice = prev_data.analysis.classifiedPrice;
            }
            // Hourly
            if (data.hourlyAnalysis && prev_data.hourlyAnalysis?.stage === data.hourlyAnalysis.stage && prev_data.hourlyAnalysis?.classifiedAt) {
              data.hourlyAnalysis.classifiedAt = prev_data.hourlyAnalysis.classifiedAt;
              data.hourlyAnalysis.classifiedPrice = prev_data.hourlyAnalysis.classifiedPrice;
            }
            // Weekly
            if (data.weeklyAnalysis && prev_data.weeklyAnalysis?.stage === data.weeklyAnalysis.stage && prev_data.weeklyAnalysis?.classifiedAt) {
              data.weeklyAnalysis.classifiedAt = prev_data.weeklyAnalysis.classifiedAt;
              data.weeklyAnalysis.classifiedPrice = prev_data.weeklyAnalysis.classifiedPrice;
            }
          }

          // Learning engine
          const snap = captureSnapshot(data.analysis, data.price);
          const hint = queryFeedback(snap);
          if (hint && hint.confidence >= 0.7 && hint.stage !== data.analysis.stage) {
            data.feedbackHint = hint;
            if (hint.confidence >= 0.85 && hint.agreeing >= 2) {
              data.analysis = { ...data.analysis, stage: hint.stage, learnedOverride: true, learnedReason: hint.reason };
            }
          }

          next[s] = data;
          const ns = overRef.current[s] ?? data.analysis.stage;
          if (os != null && os !== ns) pushAlert(s, os, ns);
          prevRef.current[s] = ns;
        } else {
          next[s] = {...(p[s]||{}), sym:s, err:r.reason?.message||"Error", loaded:false, ts:Date.now()};
        }
      });
      return next;
    });
    setBusy(p => { const s=new Set(p); syms.forEach(x=>s.delete(x)); return s; });
  }, [pushAlert]);

  const refreshAll = useCallback(async () => {
    setLastRe(new Date());
    const all = [...new Set([...MACRO,...MAINSTREAM,...inPlay])];
    for (let i=0; i<all.length; i+=5) {
      await fetchBatch(all.slice(i, i+5));
      if (i+5 < all.length) await new Promise(r=>setTimeout(r,700));
    }
  }, [inPlay, fetchBatch]);

  useEffect(()=>{ refreshAll(); }, []); // eslint-disable-line

  useEffect(()=>{
    clearInterval(rTimer.current); clearInterval(cTimer.current);
    nextTs.current = Date.now() + REFRESH_MS;
    cTimer.current = setInterval(()=>setCntDown(Math.max(0, nextTs.current-Date.now())), 1000);
    rTimer.current = setInterval(()=>{ nextTs.current=Date.now()+REFRESH_MS; refreshAll(); }, REFRESH_MS);
    return ()=>{ clearInterval(rTimer.current); clearInterval(cTimer.current); };
  }, [refreshAll]);

  // Turn Monitor
  const runTurnScan = useCallback(async () => {
    const etInfo = getETInfo();
    if (!etInfo.isMorning) return;
    const all = [...new Set([...MACRO,...MAINSTREAM,...inPlay])];
    // Only S4 (Exhausting) stocks can turn — S5 requires prior exhaustion
    const candidates = all.filter(s => {
      const stage = overRef.current[s] ?? stocks[s]?.analysis?.stage;
      return stage === 4;
    });
    if (candidates.length === 0) return;
    setTurnLastCheck(new Date());
    for (let i = 0; i < candidates.length; i += 4) {
      const batch = candidates.slice(i, i + 4);
      const results = await Promise.allSettled(batch.map(s => fetchTurnData(s)));
      results.forEach((r, idx) => {
        if (r.status !== "fulfilled") return;
        const sym = batch[idx];
        const turnBars = r.value;
        const dailyHist = stocks[sym]?.hist;
        if (!dailyHist || dailyHist.length < 22) return;
        const newAnalysis = classify(dailyHist, turnBars, chainRef.current[sym] === true);
        if (newAnalysis.stage === 5 && newAnalysis.intradayDetected) {
          const existing = turnAlerts.find(a => a.sym === sym && Date.now() - a.ts < 3600000);
          if (!existing) {
            setTurnAlerts(p => [{ sym, direction: newAnalysis.direction, gapPct: newAnalysis.gapPct, ts: Date.now() }, ...p].slice(0, 20));
            pushAlert(sym, stocks[sym]?.analysis?.stage || 3, 5);
            setStocks(p => ({ ...p, [sym]: { ...p[sym], analysis: newAnalysis, autoStage: 5, turnBars } }));
          }
        }
      });
      if (i + 4 < candidates.length) await new Promise(r => setTimeout(r, 500));
    }
  }, [stocks, inPlay, turnAlerts, pushAlert]);

  useEffect(() => {
    clearInterval(turnRef.current);
    if (turnMonitor) { runTurnScan(); turnRef.current = setInterval(runTurnScan, 5 * 60 * 1000); }
    return () => clearInterval(turnRef.current);
  }, [turnMonitor, runTurnScan]);

  // Per-timeframe override support: overrides[sym] can be a number (legacy) or
  // an object { daily: n, hourly: n, weekly: n }
  const stageOfTf = (sym, tf) => {
    const ov = overrides[sym];
    if (ov != null && typeof ov === "object" && ov[tf] != null) return ov[tf];
    if (ov != null && typeof ov === "number" && tf === "daily") return ov;
    const d = stocks[sym];
    if (!d) return 0;
    if (tf === "hourly") return d.hourlyAnalysis?.stage ?? 0;
    if (tf === "weekly") return d.weeklyAnalysis?.stage ?? 0;
    return d.analysis?.stage ?? 0;
  };
  // Returns the analysis object for the given timeframe
  const analysisForTf = (sym, tf) => {
    const d = stocks[sym];
    if (!d) return null;
    if (tf === "hourly") return d.hourlyAnalysis;
    if (tf === "weekly") return d.weeklyAnalysis;
    return d.analysis;
  };
  // stageOf uses the currently selected viewTf
  const stageOf = sym => stageOfTf(sym, viewTf);

  // Compute near-breakout/breakdown stocks (stocks in S1 on ANY timeframe, within 2% of boundary)
  const nearBreakSyms = React.useMemo(() => {
    const all = [...new Set([...MACRO, ...MAINSTREAM, ...inPlay])];
    const result = [];
    for (const sym of all) {
      const d = stocks[sym];
      if (!d?.consolBounds) continue;
      // Check if S1 on any timeframe
      const isS1Any = stageOfTf(sym, "daily") === 1 || stageOfTf(sym, "hourly") === 1 || stageOfTf(sym, "weekly") === 1;
      if (!isS1Any) continue;
      const allBounds = [...(d.consolBounds.daily || []), ...(d.consolBounds.hourly || []), ...(d.consolBounds.weekly || [])];
      const hasNear = allBounds.some(b => b.priceInRange && (b.nearBreakout || b.nearBreakdown));
      if (hasNear) result.push(sym);
    }
    return result;
  }, [stocks, overrides, inPlay]);

  const curSyms = tab === "nearbreak" ? nearBreakSyms : tab === "inplay" ? inPlay : TABS[tab]?.syms || [];
  let displaySyms = [...curSyms];
  if (filterStage != null) displaySyms = displaySyms.filter(s => stageOf(s) === filterStage);
  if (sortBy === "stage") displaySyms.sort((a,b) => stageOf(a) - stageOf(b));
  else if (sortBy === "change") displaySyms.sort((a,b) => (stocks[b]?.pct||0) - (stocks[a]?.pct||0));
  else if (sortBy === "rvol") displaySyms.sort((a,b) => (stocks[b]?.analysis?.rvol||0) - (stocks[a]?.analysis?.rvol||0));

  const enableNotif = () => { Notification.requestPermission().then(p => setNotifState(p)); };

  return (
    <div style={{ padding:"0 0 40px" }}>
      {/* Turn alerts bar */}
      {turnAlerts.length > 0 && (
        <div style={{ background:"#1a0a2e", borderBottom:"1px solid #7c3aed33", padding:"8px 20px", display:"flex", gap:"12px", alignItems:"center", overflowX:"auto" }}>
          <span style={{ color:"#a78bfa", fontWeight:"800", fontSize:"11px", flexShrink:0 }}>🔄 TURNS:</span>
          {turnAlerts.slice(0, 5).map(a => (
            <span key={a.sym+a.ts} style={{ fontSize:"11px", color:"#e2e8f0", background:"#2e1065", padding:"3px 10px", borderRadius:"4px", border:"1px solid #7c3aed55", flexShrink:0 }}>
              {a.sym} {a.direction === "toDown" ? "▼" : "▲"} gap {a.gapPct}%
            </span>
          ))}
        </div>
      )}

      {/* Header */}
      <div style={{ padding:"20px 24px 0", maxWidth:"1400px", margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"12px" }}>
          <div>
            <h1 style={{ fontSize:"22px", fontWeight:"900", letterSpacing:"0.04em", margin:0, background:"linear-gradient(135deg,#e2e8f0,#94a3b8)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>
              Stage Tracker
            </h1>
            <div style={{ color:"#475569", fontSize:"11px", marginTop:"4px" }}>
              {lastRe ? `Last refresh: ${lastRe.toLocaleTimeString()}` : "Loading…"} · Next in {fmtCnt(cntDown)}
            </div>
          </div>
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
            <button onClick={() => setTurnMonitor(p => !p)} style={{
              padding:"7px 14px", borderRadius:"7px", cursor:"pointer", fontSize:"11px", fontWeight:"800",
              border: turnMonitor ? "1px solid #7c3aed" : "1px solid #334155",
              background: turnMonitor ? "#2e106522" : "transparent",
              color: turnMonitor ? "#a78bfa" : "#64748b",
            }}>{turnMonitor ? "🔄 Turn Monitor ON" : "Turn Monitor"}</button>
            {notifState !== "granted" && (
              <button onClick={enableNotif} style={{ padding:"7px 14px", borderRadius:"7px", cursor:"pointer", fontSize:"11px", fontWeight:"700", border:"1px solid #334155", background:"transparent", color:"#64748b" }}>
                🔔 Enable Alerts
              </button>
            )}
            <button onClick={()=>setShowAlerts(true)} style={{ padding:"7px 14px", borderRadius:"7px", cursor:"pointer", fontSize:"11px", fontWeight:"700", border:"1px solid #334155", background:"transparent", color:"#64748b", position:"relative" }}>
              ⚡ History {alerts.length > 0 && <span style={{ position:"absolute", top:"-4px", right:"-4px", background:"#ef4444", color:"#fff", fontSize:"9px", fontWeight:"800", borderRadius:"10px", padding:"1px 5px" }}>{alerts.length}</span>}
            </button>
            <button onClick={refreshAll} style={{ padding:"7px 14px", borderRadius:"7px", cursor:"pointer", fontSize:"11px", fontWeight:"700", border:"1px solid #334155", background:"transparent", color:"#64748b" }}>↻ Refresh</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:"4px", marginTop:"20px" }}>
          {Object.entries(TABS).map(([k,t]) => (
            <button key={k} onClick={()=>setTab(k)} style={{
              padding:"8px 20px", borderRadius:"8px 8px 0 0", cursor:"pointer", fontSize:"12px", fontWeight:"800",
              border: tab===k ? "1px solid #334155" : "1px solid transparent", borderBottom: "none",
              background: tab===k ? "#0d1324" : "transparent", color: tab===k ? "#f8fafc" : "#475569",
            }}>
              {t.label}{k==="nearbreak" && nearBreakSyms.length > 0 && <span style={{ marginLeft:"4px", fontSize:"9px", color:"#ef4444", fontWeight:"800" }}>{nearBreakSyms.length}</span>} {k==="inplay" && <span onClick={e=>{e.stopPropagation();setShowEdit(true);}} style={{ marginLeft:"6px", fontSize:"10px", cursor:"pointer", color:"#3b82f6" }}>✎</span>}
            </button>
          ))}
        </div>

        {/* Timeframe / Sort / Filter */}
        <div style={{ display:"flex", gap:"8px", marginTop:"14px", flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ color:"#475569", fontSize:"10px", fontWeight:"700" }}>TIMEFRAME:</span>
          {[["hourly","Hourly"],["daily","Daily"],["weekly","Weekly"]].map(([k,l]) => (
            <button key={k} onClick={()=>setViewTf(k)} style={{
              padding:"5px 14px", borderRadius:"5px", cursor:"pointer", fontSize:"11px", fontWeight:"800",
              border: viewTf===k ? "1px solid #a78bfa" : "1px solid #1e293b",
              background: viewTf===k ? "#2e106530" : "transparent",
              color: viewTf===k ? "#c4b5fd" : "#475569",
            }}>{l}</button>
          ))}

          <span style={{ color:"#334155", margin:"0 4px" }}>│</span>

          <span style={{ color:"#475569", fontSize:"10px", fontWeight:"700" }}>STAGE:</span>
          {[null,0,1,2,3,4,5,6].map(st => (
            <button key={st??"all"} onClick={()=>setFilterStage(st)} style={{
              padding:"4px 10px", borderRadius:"4px", cursor:"pointer", fontSize:"10px", fontWeight:"700",
              border: filterStage===st ? "1px solid #3b82f6" : "1px solid #1e293b",
              background: filterStage===st ? "#1e408030" : "transparent",
              color: filterStage===st ? "#93c5fd" : st != null ? (STAGES[st]?.color || "#475569") : "#475569",
            }}>{st === null ? "All" : st === 0 ? "💤" : `S${st}`}</button>
          ))}

          <span style={{ color:"#334155", margin:"0 4px" }}>│</span>

          <span style={{ color:"#475569", fontSize:"10px", fontWeight:"700" }}>SORT:</span>
          {[["default","Default"],["stage","Stage"],["change","% Chg"],["rvol","RVOL"]].map(([k,l]) => (
            <button key={k} onClick={()=>setSortBy(k)} style={{
              padding:"4px 10px", borderRadius:"4px", cursor:"pointer", fontSize:"10px", fontWeight:"700",
              border: sortBy===k ? "1px solid #3b82f6" : "1px solid #1e293b",
              background: sortBy===k ? "#1e408030" : "transparent", color: sortBy===k ? "#93c5fd" : "#475569",
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* Near Break empty state */}
      {tab === "nearbreak" && nearBreakSyms.length === 0 && (
        <div style={{ padding:"60px 24px", textAlign:"center", color:"#475569" }}>
          <div style={{ fontSize:"36px", marginBottom:"12px" }}>◈</div>
          <div style={{ fontSize:"14px", fontWeight:"700" }}>No stocks within 2% of breakout or breakdown</div>
          <div style={{ fontSize:"12px", marginTop:"6px" }}>This page shows S1 (Consolidation) stocks near their range boundaries.</div>
        </div>
      )}

      {/* Cards grid */}
      <div style={{ padding:"16px 24px", maxWidth:"1400px", margin:"0 auto",
        display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))", gap:"10px",
      }}>
        {displaySyms.map(sym => (
          <StockCard key={sym} sym={sym} d={stocks[sym]} effStage={stageOf(sym)}
            isLoading={busy.has(sym)} isManual={overrides[sym]!=null && (typeof overrides[sym]==="number" || Object.keys(overrides[sym]).length>0)}
            showNearBreak={tab === "nearbreak"}
            tfAnalysis={analysisForTf(sym, viewTf)}
            viewTf={viewTf}
            relStrength={sym !== "SPY" && stocks["SPY"]?.hist && stocks[sym]?.hist ? calcRelativeStrength(stocks[sym].hist, stocks["SPY"].hist, 20) : null}
            onClick={()=>setDetail(sym)} />
        ))}
      </div>

      {/* Modals */}
      {detail && stocks[detail] && (
        <DetailModal sym={detail} d={stocks[detail]} effStage={stageOf(detail)}
          isManual={overrides[detail]!=null && (typeof overrides[detail]==="number" || Object.keys(overrides[detail]).length>0)} setOverrides={setOverrides}
          onRecordFeedback={handleRecordFeedback}
          feedbackHint={stocks[detail]?.feedbackHint}
          refreshAllTickers={refreshAll}
          overrides={overrides}
          relStrength={detail !== "SPY" && stocks["SPY"]?.hist && stocks[detail]?.hist ? calcRelativeStrength(stocks[detail].hist, stocks["SPY"].hist, 20) : null}
          onClose={()=>setDetail(null)} />
      )}
      {showEdit && <InPlayEditor inPlay={inPlay} setInPlay={setInPlay} onFetch={fetchBatch} onClose={()=>setShowEdit(false)}/>}
      {showAlerts && <AlertsPanel alerts={alerts} onClose={()=>setShowAlerts(false)}/>}

      {/* Footer */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#060b18ee", backdropFilter:"blur(8px)", borderTop:"1px solid #1e293b",
        padding:"6px 24px", display:"flex", justifyContent:"space-between", fontSize:"10px", color:"#334155" }}>
        <span>Yahoo Finance · 30-min refresh · Proxy {activeProxyIdx+1}/{CORS_PROXIES.length} · {yahooAuth.crumb ? "Crumb ✓" : "No crumb"}</span>
        <span>{feedbackCount > 0 ? `🧠 ${feedbackCount} learned · ` : ""}{alerts.length} changes logged</span>
      </div>
    </div>
  );
}

// ================================================================
// CALENDAR PAGE (placeholder)
// ================================================================
function CalendarPage() {
  return (
    <div style={{ padding:"80px 24px", textAlign:"center" }}>
      <div style={{ fontSize:"48px", marginBottom:"16px" }}>📅</div>
      <div style={{ fontSize:"20px", fontWeight:"800", color:"#e2e8f0" }}>Calendar</div>
      <div style={{ fontSize:"13px", color:"#475569", marginTop:"8px" }}>Coming soon — earnings dates, economic events, and trading calendar.</div>
    </div>
  );
}

// ================================================================
// TOP-LEVEL APP — page router with tabs
// ================================================================
function App() {
  const [page, setPage] = useState("tracker");

  return (
    <div style={{ fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif", color:"#e2e8f0", minHeight:"100vh" }}>
      {/* Top navigation */}
      <div style={{ background:"#060b18", borderBottom:"1px solid #1e293b", padding:"0 24px", position:"sticky", top:0, zIndex:200, backdropFilter:"blur(12px)" }}>
        <div style={{ maxWidth:"1400px", margin:"0 auto", display:"flex", alignItems:"center", gap:"0" }}>
          <span style={{ fontSize:"14px", fontWeight:"900", letterSpacing:"0.06em", color:"#475569", marginRight:"24px", padding:"14px 0" }}>JG</span>
          {[
            { id: "tracker",  label: "Stage Tracker", icon: "📊" },
            { id: "research", label: "Research",      icon: "🔬" },
            { id: "calendar", label: "Calendar",      icon: "📅" },
          ].map(t => (
            <button key={t.id} onClick={() => setPage(t.id)} style={{
              padding:"14px 20px", cursor:"pointer", fontSize:"13px", fontWeight:"700",
              background:"transparent", border:"none", borderBottom: page === t.id ? "2px solid #818cf8" : "2px solid transparent",
              color: page === t.id ? "#e2e8f0" : "#475569",
              transition:"all 0.15s ease",
            }}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Page content */}
      {page === "tracker"  && <StageTrackerPage />}
      {page === "research" && <ResearchPage />}
      {page === "calendar" && <CalendarPage />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
